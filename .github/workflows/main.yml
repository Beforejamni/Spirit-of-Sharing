name: Auto PR & Auto-merge

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "dev"
  pull_request:
    branches:
      - "dev"
      
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  ci-and-automerge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build & Test
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew clean build test --no-daemon

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test
            **/build/test-results/test

      - name: Create PR not exists
        if: ${{ github.event_name == 'push' }}
        id: create_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          HEAD="${GITHUB_REF_NAME}"
          BASE="dev"

          if [ "$HEAD" = "$BASE" ]; then
            echo "PR_NUMBER=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(gh pr list --head "$HEAD" --base "$BASE" --state open --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "Auto PR: $HEAD -> $BASE" \
            --body "Auto-generated PR for $HEAD" \
            --label automerge

            PR_NUMBER=$(gh pr list --head "$HEAD" --base "$BASE" --state open --json number --jq '.[0].number')
          fi

          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable PR auto-merge
        if: ${{ github.event_name == 'push' && steps.create_pr.outputs.PR_NUMBER != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --merge --auto ${{ steps.create_pr.outputs.PR_NUMBER}}
          
            
